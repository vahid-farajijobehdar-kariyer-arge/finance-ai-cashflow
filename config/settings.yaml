# Application Settings / Uygulama Ayarları

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  output: "data/output"

# Number formatting / Sayı formatı
formatting:
  # Türkiye formatı: nokta bin ayırıcı, virgül ondalık
  thousands_separator: "."
  decimal_separator: ","
  currency_symbol: "₺"
  currency_code: "TRY"
  # Ondalık basamak sayısı
  decimal_places: 2

# Processing settings
processing:
  # Only include these transaction types
  include_transaction_types:
    - "successful_sale"
    - "SATIŞ"
    - "Satış"
    - "Peşin Satış"
  
  # Exclude these transaction types (refunds, cancellations, failures)
  exclude_transaction_types:
    - "İADE"
    - "İade"
    - "IADE"
    - "IAD"
    - "REFUND"
    - "Refund"
    - "İPTAL"
    - "İptal"
    - "BAŞARISIZ"
    - "Başarısız"

# Dashboard settings
dashboard:
  title: "Cash Flow Dashboard / Nakit Akış Paneli"
  page_icon: "💰"
  layout: "wide"
  
# Report settings
reports:
  date_format: "%Y-%m-%d"
  currency: "TRY"
  currency_symbol: "₺"

# Mevduat faiz oranları (Gelecek Değer hesaplayıcı için)
# Oranlar yıllık, ondalık olarak (0.42 = %42)
deposit_rates:
